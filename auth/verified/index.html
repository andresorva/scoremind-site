<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email verified — ScoreMind AI</title>
  <meta name="description" content="Your ScoreMind AI account has been successfully verified.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0e1a;
      color: #f1f5f9;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: #00e5cc; text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.8; }

    /* Nav */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-logo img {
      width: 36px;
      height: 36px;
      border-radius: 20%;
    }
    .nav-logo span {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .nav-logo .ai { color: #00e5cc; }
    .lang-toggle {
      display: flex;
      background: #1a2236;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .lang-btn {
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #64748b;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: #00e5cc;
      color: #0a0e1a;
    }

    /* Verified hero */
    .hero-verified {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px 40px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }
    .check-wrap {
      width: 80px;
      height: 80px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      box-shadow: 0 0 40px rgba(34,197,94,0.25);
      transform: scale(0);
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
    }
    @keyframes scaleIn {
      0%   { transform: scale(0); }
      100% { transform: scale(1); }
    }
    .check-wrap svg {
      width: 48px;
      height: 48px;
    }
    .verified-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #f1f5f9, #00e5cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .verified-subtitle {
      font-size: 17px;
      color: #94a3b8;
      max-width: 460px;
      margin: 0 auto 32px;
    }
    .verified-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      border-radius: 12px;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      text-decoration: none;
    }
    .btn-primary {
      background: #00e5cc;
      color: #0a0e1a;
    }
    .btn-primary:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }
    .btn-ghost {
      background: transparent;
      color: #f1f5f9;
      border-color: rgba(255,255,255,0.15);
    }
    .btn-ghost:hover {
      border-color: #00e5cc;
      color: #00e5cc;
    }

    /* Footer */
    .footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 24px;
      text-align: center;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .footer-links a { font-size: 13px; color: #94a3b8; }
    .footer-links a:hover { color: #00e5cc; }
    .footer-copy { font-size: 12px; color: #64748b; }

    /* Responsive */
    @media (min-width: 768px) {
      .hero-verified { padding: 80px 24px 60px; }
      .verified-actions {
        flex-direction: row;
        justify-content: center;
        max-width: none;
      }
      .btn { min-width: 200px; }
    }
    @media (max-width: 420px) {
      .nav { padding: 12px 16px; }
      .hero-verified { padding: 40px 16px 32px; }
      .verified-title { font-size: 26px; }
      .verified-subtitle { font-size: 15px; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <a href="/" class="nav-logo">
      <img src="/logo.png" alt="ScoreMind.AI">
      <span>ScoreMind<span class="ai">.AI</span></span>
    </a>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('es')">ES</button>
    </div>
  </nav>

  <!-- Verified hero -->
  <section class="hero-verified">
    <div class="check-wrap" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 12.5L9.5 18L20 7" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="verified-title" data-en="Email verified!" data-es="¡Email verificado!">Email verified!</h1>
    <p class="verified-subtitle" data-en="Your account is ready. Open ScoreMind AI to access all features." data-es="Tu cuenta esta lista. Ya puedes abrir ScoreMind AI y acceder a todas las funciones.">Your account is ready. Open ScoreMind AI to access all features.</p>
    <div class="verified-actions">
      <a href="https://scoremind.ai" class="btn btn-primary" data-en="Open ScoreMind AI" data-es="Abrir ScoreMind AI">Open ScoreMind AI</a>
      <a href="/" class="btn btn-ghost" data-en="Back to home" data-es="Volver al inicio">Back to home</a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-links">
      <a href="/privacy" data-en="Privacy Policy" data-es="Politica de Privacidad">Privacy Policy</a>
      <a href="/terms" data-en="Terms of Service" data-es="Terminos de Servicio">Terms of Service</a>
      <a href="mailto:info@datanaat.com" data-en="Contact" data-es="Contacto">Contact</a>
    </div>
    <div class="footer-copy">&copy; 2026 Datanaat. All rights reserved.</div>
  </footer>

  <script>
    let currentLang = 'en';
    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim() === lang.toUpperCase());
      });
      document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        el.textContent = el.getAttribute('data-' + lang);
      });
      document.documentElement.lang = lang;
    }
  </script>
</body>
</html>
